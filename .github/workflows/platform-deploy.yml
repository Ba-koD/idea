name: Manage Platform MVP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      operation:
        description: "Platform operation."
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      ansible_tags:
        description: "Optional comma-separated Ansible tags for apply."
        required: false
        default: ""

concurrency:
  group: platform-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on:
      - self-hosted
      - macOS
    env:
      PLATFORM_OPERATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.operation || 'apply' }}
      PLATFORM_ANSIBLE_TAGS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ansible_tags || '' }}
      PLATFORM_TERRAFORM_VERSION: "1.14.4"
      ANSIBLE_CONFIG: ${{ github.workspace }}/infra/ansible/ansible.cfg
      ANSIBLE_HOST_KEY_CHECKING: "False"
      ANSIBLE_LOCAL_TEMP: /tmp/ansible-local
      ANSIBLE_REMOTE_TEMP: /tmp/ansible-remote

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect platform service changes
        id: detect_changes
        run: |
          set -euo pipefail

          frontend_changed=true
          backend_changed=true

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            before_sha="${{ github.event.before }}"
            after_sha="${{ github.sha }}"

            if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
              git fetch --no-tags --depth=1 origin "$before_sha"
              changed_files="$(git diff --name-only "$before_sha" "$after_sha" || true)"

              frontend_changed=false
              backend_changed=false

              if printf '%s\n' "$changed_files" | grep -Eq '^frontend/'; then
                frontend_changed=true
              fi

              if printf '%s\n' "$changed_files" | grep -Eq '^backend/'; then
                backend_changed=true
              fi
            fi
          fi

          echo "frontend_changed=$frontend_changed" >> "$GITHUB_OUTPUT"
          echo "backend_changed=$backend_changed" >> "$GITHUB_OUTPUT"
          echo "PLATFORM_BUILD_FRONTEND=$frontend_changed" >> "$GITHUB_ENV"
          echo "PLATFORM_BUILD_BACKEND=$backend_changed" >> "$GITHUB_ENV"

      - name: Bootstrap runner toolchain
        run: |
          set -euo pipefail

          bootstrap_root="$HOME/.cache/idea-platform"
          bootstrap_bin="$bootstrap_root/bootstrap/bin"
          mkdir -p "$bootstrap_bin"

          {
            echo /opt/homebrew/bin
            echo /opt/homebrew/sbin
            echo /Applications/Docker.app/Contents/Resources/bin
            echo "$bootstrap_bin"
          } >> "$GITHUB_PATH"

          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/Applications/Docker.app/Contents/Resources/bin:$bootstrap_bin:$PATH"

          /opt/homebrew/bin/brew --version

          TERRAFORM_VERSION="${PLATFORM_TERRAFORM_VERSION}"
          if [ ! -x "$bootstrap_bin/terraform" ] || ! "$bootstrap_bin/terraform" version | grep -q "Terraform v${TERRAFORM_VERSION}"; then
            curl -fsSL -o "$RUNNER_TEMP/terraform.zip" "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_darwin_arm64.zip"
            unzip -oq "$RUNNER_TEMP/terraform.zip" -d "$bootstrap_bin"
            chmod +x "$bootstrap_bin/terraform"
          fi

          python3 --version
          "$bootstrap_bin/terraform" version
          docker version

      - name: Install Ansible
        run: |
          set -euo pipefail

          ansible_root="$HOME/.cache/idea-platform"
          ansible_venv="$ansible_root/ansible-venv"
          mkdir -p "$ansible_root"

          if [ ! -x "$ansible_venv/bin/ansible-playbook" ]; then
            python3 -m venv "$ansible_venv"
            "$ansible_venv/bin/python" -m pip install --upgrade pip
            "$ansible_venv/bin/python" -m pip install ansible-core
          fi

          echo "$ansible_venv/bin" >> "$GITHUB_PATH"
          "$ansible_venv/bin/ansible-playbook" --version

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLATFORM_SSH_PRIVATE_KEY }}

      - name: Preflight SSH connectivity
        env:
          PLATFORM_TARGET_HOST: ${{ secrets.PLATFORM_TARGET_HOST }}
          PLATFORM_TARGET_USER: ${{ secrets.PLATFORM_TARGET_USER }}
          PLATFORM_TARGET_PORT: ${{ vars.PLATFORM_TARGET_PORT }}
        run: |
          set -euo pipefail

          target_host="$(printf '%s' "${PLATFORM_TARGET_HOST:-}" | tr -d '\r' | xargs)"
          target_user="$(printf '%s' "${PLATFORM_TARGET_USER:-}" | tr -d '\r' | xargs)"
          target_port="$(printf '%s' "${PLATFORM_TARGET_PORT:-22}" | tr -d '\r' | xargs)"

          if [ -z "$target_host" ] || [ -z "$target_user" ]; then
            echo "PLATFORM_TARGET_HOST and PLATFORM_TARGET_USER must be non-empty after trimming whitespace."
            exit 1
          fi

          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            -p "$target_port" \
            "${target_user}@${target_host}" \
            'uname -s && id -un'

      - name: Preflight Cloudflare API access
        if: ${{ env.PLATFORM_OPERATION != 'destroy' }}
        env:
          PLATFORM_ENABLE_CLOUDFLARED: ${{ vars.PLATFORM_ENABLE_CLOUDFLARED }}
          PLATFORM_CLOUDFLARE_API_TOKEN: ${{ secrets.PLATFORM_CLOUDFLARE_API_TOKEN }}
          PLATFORM_CLOUDFLARE_ACCOUNT_ID: ${{ vars.PLATFORM_CLOUDFLARE_ACCOUNT_ID }}
          PLATFORM_CLOUDFLARE_ZONE_ID: ${{ vars.PLATFORM_CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          def parse_bool(value: str | None) -> bool:
              if not value:
                  return False
              normalized = value.strip().lower()
              if normalized in {"1", "true", "yes", "on"}:
                  return True
              if normalized in {"0", "false", "no", "off"}:
                  return False
              raise SystemExit(f"Invalid boolean value: {value}")

          def get_env(name: str, default: str | None = None) -> str | None:
              value = os.getenv(name)
              if value is None:
                  return default
              normalized = value.replace("\r", "").strip()
              if normalized == "":
                  return default
              return normalized

          def call(url: str, token: str) -> tuple[int, dict]:
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      status = response.status
                      payload = json.load(response)
              except urllib.error.HTTPError as exc:
                  status = exc.code
                  try:
                      payload = json.load(exc)
                  except Exception:
                      payload = {"success": False, "errors": [{"message": exc.reason}]}
              return status, payload

          if not parse_bool(get_env("PLATFORM_ENABLE_CLOUDFLARED")):
              print("cloudflare-preflight-skipped")
              raise SystemExit(0)

          token = get_env("PLATFORM_CLOUDFLARE_API_TOKEN", "")
          if not token:
              print("cloudflare-api-preflight-skipped-no-token")
              raise SystemExit(0)

          account_id = get_env("PLATFORM_CLOUDFLARE_ACCOUNT_ID", "")
          zone_id = get_env("PLATFORM_CLOUDFLARE_ZONE_ID", "")
          required = {
              "PLATFORM_CLOUDFLARE_ACCOUNT_ID": account_id,
              "PLATFORM_CLOUDFLARE_ZONE_ID": zone_id,
          }
          missing = [name for name, value in required.items() if not value]
          if missing:
              raise SystemExit(f"Missing required Cloudflare configuration: {', '.join(missing)}")

          checks = [
              ("token verification", "https://api.cloudflare.com/client/v4/user/tokens/verify", {200}),
              ("tunnel access", f"https://api.cloudflare.com/client/v4/accounts/{account_id}/cfd_tunnel", {200}),
              ("dns access", f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records?per_page=1", {200}),
              ("waf access", f"https://api.cloudflare.com/client/v4/zones/{zone_id}/rulesets/phases/http_request_firewall_custom/entrypoint", {200, 404}),
          ]

          for label, url, allowed_statuses in checks:
              status, payload = call(url, token)
              if status not in allowed_statuses:
                  raise SystemExit(f"Cloudflare {label} failed with status {status}: {payload}")
              if label == "waf access" and status == 404:
                  continue
              if not payload.get("success", False):
                  raise SystemExit(f"Cloudflare {label} failed with status {status}: {payload}")

          print("cloudflare-preflight-ok")
          PY

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Generate Terraform vars from GitHub configuration
        working-directory: infra/terraform
        env:
          PLATFORM_TARGET_HOST: ${{ secrets.PLATFORM_TARGET_HOST }}
          PLATFORM_TARGET_USER: ${{ secrets.PLATFORM_TARGET_USER }}
          PLATFORM_TARGET_PORT: ${{ vars.PLATFORM_TARGET_PORT }}
          PLATFORM_TARGET_BECOME: ${{ vars.PLATFORM_TARGET_BECOME }}
          PLATFORM_ENVIRONMENT_NAME: ${{ vars.PLATFORM_ENVIRONMENT_NAME }}
          PLATFORM_TARGET_NAME: ${{ vars.PLATFORM_TARGET_NAME }}
          PLATFORM_CONTAINER_RUNTIME: ${{ vars.PLATFORM_CONTAINER_RUNTIME }}
          PLATFORM_IDEA_BASE_DOMAIN: ${{ vars.PLATFORM_IDEA_BASE_DOMAIN }}
          PLATFORM_KIND_CLUSTER_NAME: ${{ vars.PLATFORM_KIND_CLUSTER_NAME }}
          PLATFORM_KIND_NODE_IMAGE: ${{ vars.PLATFORM_KIND_NODE_IMAGE }}
          PLATFORM_KIND_VERSION: ${{ vars.PLATFORM_KIND_VERSION }}
          PLATFORM_KUBECTL_VERSION: ${{ vars.PLATFORM_KUBECTL_VERSION }}
          PLATFORM_HELM_VERSION: ${{ vars.PLATFORM_HELM_VERSION }}
          PLATFORM_ARGOCD_VERSION: ${{ vars.PLATFORM_ARGOCD_VERSION }}
          PLATFORM_ENABLE_MONITORING: ${{ vars.PLATFORM_ENABLE_MONITORING }}
          PLATFORM_ENABLE_VAULT: ${{ vars.PLATFORM_ENABLE_VAULT }}
          PLATFORM_ENABLE_CLOUDFLARED: ${{ vars.PLATFORM_ENABLE_CLOUDFLARED }}
          PLATFORM_ENABLE_CLOUDFLARE_RECONCILIATION: ${{ vars.PLATFORM_ENABLE_CLOUDFLARE_RECONCILIATION }}
          PLATFORM_CADDY_BACKEND_BASE_PATH: ${{ vars.PLATFORM_CADDY_BACKEND_BASE_PATH }}
          PLATFORM_IDEA_NAMESPACE: ${{ vars.PLATFORM_IDEA_NAMESPACE }}
          PLATFORM_EDGE_NAMESPACE: ${{ vars.PLATFORM_EDGE_NAMESPACE }}
          PLATFORM_MONITORING_NAMESPACE: ${{ vars.PLATFORM_MONITORING_NAMESPACE }}
          PLATFORM_DATA_NAMESPACE: ${{ vars.PLATFORM_DATA_NAMESPACE }}
          PLATFORM_VAULT_NAMESPACE: ${{ vars.PLATFORM_VAULT_NAMESPACE }}
          PLATFORM_CLOUDFLARE_ACCOUNT_ID: ${{ vars.PLATFORM_CLOUDFLARE_ACCOUNT_ID }}
          PLATFORM_CLOUDFLARE_ZONE_ID: ${{ vars.PLATFORM_CLOUDFLARE_ZONE_ID }}
          PLATFORM_CLOUDFLARE_PUBLIC_SUBDOMAIN: ${{ vars.PLATFORM_CLOUDFLARE_PUBLIC_SUBDOMAIN }}
          PLATFORM_CLOUDFLARE_TUNNEL_NAME: ${{ vars.PLATFORM_CLOUDFLARE_TUNNEL_NAME }}
          PLATFORM_CLOUDFLARE_ADMIN_ALLOWED_IPS: ${{ vars.PLATFORM_CLOUDFLARE_ADMIN_ALLOWED_IPS }}
          PLATFORM_BUILD_FRONTEND: ${{ steps.detect_changes.outputs.frontend_changed }}
          PLATFORM_BUILD_BACKEND: ${{ steps.detect_changes.outputs.backend_changed }}
          PLATFORM_POSTGRESQL_PASSWORD: ${{ secrets.PLATFORM_POSTGRESQL_PASSWORD }}
          PLATFORM_VAULT_DEV_ROOT_TOKEN: ${{ secrets.PLATFORM_VAULT_DEV_ROOT_TOKEN }}
          PLATFORM_CLOUDFLARED_TUNNEL_TOKEN: ${{ secrets.PLATFORM_CLOUDFLARED_TUNNEL_TOKEN }}
          PLATFORM_CLOUDFLARE_API_TOKEN: ${{ secrets.PLATFORM_CLOUDFLARE_API_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          missing = []

          def get_env(name: str, default: str | None = None) -> str | None:
            value = os.getenv(name)
            if value is None:
              return default
            normalized = value.replace("\r", "").strip()
            if normalized == "":
              return default
            return normalized

          def require_env(name: str) -> str:
            value = get_env(name)
            if value is None:
              missing.append(name)
              return ""
            return value

          def parse_bool(name: str, default: bool) -> bool:
            value = get_env(name)
            if value is None:
              return default
            normalized = value.strip().lower()
            if normalized in {"1", "true", "yes", "on"}:
              return True
            if normalized in {"0", "false", "no", "off"}:
              return False
            raise SystemExit(f"Invalid boolean for {name}: {value}")

          def parse_optional_bool(name: str) -> bool | None:
            value = get_env(name)
            if value is None:
              return None
            normalized = value.strip().lower()
            if normalized in {"1", "true", "yes", "on"}:
              return True
            if normalized in {"0", "false", "no", "off"}:
              return False
            raise SystemExit(f"Invalid boolean for {name}: {value}")

          def parse_csv(name: str) -> list[str]:
            value = get_env(name, "")
            if not value:
              return []
            return [item.strip() for item in value.split(",") if item.strip()]

          enable_cloudflared = parse_bool("PLATFORM_ENABLE_CLOUDFLARED", False)
          explicit_cloudflare_reconciliation = parse_optional_bool("PLATFORM_ENABLE_CLOUDFLARE_RECONCILIATION")
          cloudflare_api_token = get_env("PLATFORM_CLOUDFLARE_API_TOKEN", "")
          cloudflared_tunnel_token = get_env("PLATFORM_CLOUDFLARED_TUNNEL_TOKEN", "")
          if explicit_cloudflare_reconciliation is None:
            enable_cloudflare_reconciliation = enable_cloudflared and bool(cloudflare_api_token)
          else:
            enable_cloudflare_reconciliation = explicit_cloudflare_reconciliation

          tfvars = {
            "environment_name": get_env("PLATFORM_ENVIRONMENT_NAME", "platform"),
            "target_name": get_env("PLATFORM_TARGET_NAME", "idea-platform-host"),
            "target_host": require_env("PLATFORM_TARGET_HOST"),
            "target_port": int(get_env("PLATFORM_TARGET_PORT", "22")),
            "target_user": require_env("PLATFORM_TARGET_USER"),
            "target_become": parse_bool("PLATFORM_TARGET_BECOME", False),
            "platform_container_runtime": get_env("PLATFORM_CONTAINER_RUNTIME", "docker"),
            "idea_base_domain": get_env("PLATFORM_IDEA_BASE_DOMAIN", "idea.local"),
            "kind_cluster_name": get_env("PLATFORM_KIND_CLUSTER_NAME", "idea"),
            "kind_node_image": get_env("PLATFORM_KIND_NODE_IMAGE", "kindest/node:v1.30.0"),
            "kind_version": get_env("PLATFORM_KIND_VERSION", "v0.23.0"),
            "kubectl_version": get_env("PLATFORM_KUBECTL_VERSION", "v1.30.3"),
            "helm_version": get_env("PLATFORM_HELM_VERSION", "v3.15.4"),
            "argocd_version": get_env("PLATFORM_ARGOCD_VERSION", "v2.11.7"),
            "enable_monitoring": parse_bool("PLATFORM_ENABLE_MONITORING", True),
            "enable_vault": parse_bool("PLATFORM_ENABLE_VAULT", True),
            "enable_cloudflared": enable_cloudflared,
            "enable_cloudflare_reconciliation": enable_cloudflare_reconciliation,
            "platform_caddy_backend_base_path": get_env("PLATFORM_CADDY_BACKEND_BASE_PATH", "/api"),
            "platform_build_frontend": parse_bool("PLATFORM_BUILD_FRONTEND", True),
            "platform_build_backend": parse_bool("PLATFORM_BUILD_BACKEND", True),
            "idea_namespace": get_env("PLATFORM_IDEA_NAMESPACE", "idea-system"),
            "edge_namespace": get_env("PLATFORM_EDGE_NAMESPACE", "edge-system"),
            "monitoring_namespace": get_env("PLATFORM_MONITORING_NAMESPACE", "monitoring"),
            "data_namespace": get_env("PLATFORM_DATA_NAMESPACE", "idea-data"),
            "vault_namespace": get_env("PLATFORM_VAULT_NAMESPACE", "vault"),
            "postgresql_password": require_env("PLATFORM_POSTGRESQL_PASSWORD"),
            "vault_dev_root_token": require_env("PLATFORM_VAULT_DEV_ROOT_TOKEN"),
          }

          if enable_cloudflare_reconciliation:
            if not enable_cloudflared:
              raise SystemExit("PLATFORM_ENABLE_CLOUDFLARE_RECONCILIATION=true requires PLATFORM_ENABLE_CLOUDFLARED=true")
            tfvars["cloudflare_api_token"] = cloudflare_api_token or require_env("PLATFORM_CLOUDFLARE_API_TOKEN")
            tfvars["cloudflare_account_id"] = require_env("PLATFORM_CLOUDFLARE_ACCOUNT_ID")
            tfvars["cloudflare_zone_id"] = require_env("PLATFORM_CLOUDFLARE_ZONE_ID")
            tfvars["cloudflare_public_subdomain"] = get_env("PLATFORM_CLOUDFLARE_PUBLIC_SUBDOMAIN", "idea")
            tfvars["cloudflare_tunnel_name"] = get_env("PLATFORM_CLOUDFLARE_TUNNEL_NAME", "idea-platform")
            tfvars["cloudflare_admin_allowed_ips"] = parse_csv("PLATFORM_CLOUDFLARE_ADMIN_ALLOWED_IPS")
            if not tfvars["cloudflare_admin_allowed_ips"]:
              missing.append("PLATFORM_CLOUDFLARE_ADMIN_ALLOWED_IPS")
          elif enable_cloudflared:
            tfvars["cloudflared_tunnel_token"] = cloudflared_tunnel_token or require_env("PLATFORM_CLOUDFLARED_TUNNEL_TOKEN")

          if missing:
            joined = ", ".join(sorted(set(missing)))
            raise SystemExit(f"Missing required GitHub configuration: {joined}")

          Path("github.auto.tfvars.json").write_text(json.dumps(tfvars, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Terraform prepare contract state
        working-directory: infra/terraform
        run: terraform apply -auto-approve -var-file=github.auto.tfvars.json

      - name: Render Ansible inputs
        working-directory: infra/terraform
        run: |
          mkdir -p ../ansible/generated
          terraform output -raw ansible_inventory_ini > ../ansible/generated/inventory.ini
          terraform output -json ansible_extra_vars > ../ansible/generated/extra-vars.json

      - name: Run Ansible platform install
        if: ${{ env.PLATFORM_OPERATION != 'destroy' }}
        working-directory: infra/ansible
        run: |
          if [ -n "${PLATFORM_ANSIBLE_TAGS}" ]; then
            ansible-playbook -i generated/inventory.ini site.yml --extra-vars @generated/extra-vars.json --tags "${PLATFORM_ANSIBLE_TAGS}"
          else
            ansible-playbook -i generated/inventory.ini site.yml --extra-vars @generated/extra-vars.json
          fi

      - name: Run Ansible platform destroy
        if: ${{ env.PLATFORM_OPERATION == 'destroy' }}
        working-directory: infra/ansible
        run: ansible-playbook -i generated/inventory.ini destroy.yml --extra-vars @generated/extra-vars.json

      - name: Terraform destroy contract state
        if: ${{ env.PLATFORM_OPERATION == 'destroy' }}
        working-directory: infra/terraform
        run: terraform destroy -auto-approve -var-file=github.auto.tfvars.json
