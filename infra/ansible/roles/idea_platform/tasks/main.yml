- name: Ensure idea namespace exists
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.shell: |
    kubectl create namespace {{ idea_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Assert GitOps repository configuration
  ansible.builtin.assert:
    that:
      - gitops_repo_url | length > 0
      - gitops_repo_branch | length > 0
      - gitops_repo_path | length > 0
    fail_msg: "gitops_repo_url, gitops_repo_branch, and gitops_repo_path must be set for Argo CD app delivery."

- name: Render Argo CD repository credential
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/argocd-repository.yaml.j2"
    dest: /tmp/idea-argocd-repository.yaml
    mode: "0600"
  when: gitops_repo_token | length > 0

- name: Apply Argo CD repository credential
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - /tmp/idea-argocd-repository.yaml
  when: gitops_repo_token | length > 0
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Render idea Argo CD Application
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/idea-argocd-application.yaml.j2"
    dest: /tmp/idea-argocd-application.yaml
    mode: "0644"

- name: Apply idea Argo CD Application
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - /tmp/idea-argocd-application.yaml
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Wait for idea Argo CD Application to become synced and healthy
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.shell: |
    set -euo pipefail
    for _ in $(seq 1 60); do
      sync_status="$(kubectl get application idea-platform -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
      health_status="$(kubectl get application idea-platform -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
      if [ "${sync_status}" = "Synced" ] && [ "${health_status}" = "Healthy" ]; then
        exit 0
      fi
      sleep 5
    done
    kubectl get application idea-platform -n argocd -o yaml || true
    exit 1
  args:
    executable: /bin/bash
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Wait for frontend rollout
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - rollout
      - status
      - "deployment/{{ idea_frontend_name }}"
      - -n
      - "{{ idea_namespace }}"
      - --timeout=300s
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Wait for backend rollout
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - rollout
      - status
      - "deployment/{{ idea_backend_name }}"
      - -n
      - "{{ idea_namespace }}"
      - --timeout=300s
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"
