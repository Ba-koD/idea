- name: Ensure idea namespace exists
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.shell: |
    kubectl create namespace {{ idea_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Remove legacy idea Argo CD application finalizers
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.shell: |
    set -euo pipefail
    if kubectl get application idea-platform -n argocd >/dev/null 2>&1; then
      kubectl patch application idea-platform -n argocd --type merge -p '{"metadata":{"finalizers":[]}}'
    fi
  args:
    executable: /bin/bash
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Delete legacy idea Argo CD application
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - delete
      - application
      - idea-platform
      - -n
      - argocd
      - --ignore-not-found=true
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Wait for legacy idea Argo CD application removal
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.shell: |
    set -euo pipefail
    for _ in $(seq 1 30); do
      if ! kubectl get application idea-platform -n argocd >/dev/null 2>&1; then
        exit 0
      fi
      sleep 2
    done
    kubectl get application idea-platform -n argocd -o yaml || true
    exit 1
  args:
    executable: /bin/bash
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Delete legacy Argo CD repository credential
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - delete
      - secret
      - idea-gitops-repository
      - -n
      - argocd
      - --ignore-not-found=true
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Create platform app build workspace
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.file:
    path: "{{ idea_build_workspace }}"
    state: directory
    mode: "0755"

- name: Create Docker config directory for non-interactive builds
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.file:
    path: "{{ idea_docker_config_dir }}"
    state: directory
    mode: "0700"

- name: Write empty Docker config to bypass macOS keychain helper
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.copy:
    dest: "{{ idea_docker_config_dir }}/config.json"
    content: |
      {}
    mode: "0600"

- name: Reset frontend build workspace when frontend rebuild is enabled
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.file:
    path: "{{ idea_build_workspace }}/frontend"
    state: absent
  when: platform_build_frontend

- name: Reset backend build workspace when backend rebuild is enabled
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.file:
    path: "{{ idea_build_workspace }}/backend"
    state: absent
  when: platform_build_backend

- name: Sync frontend source to target build workspace
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../frontend/"
    dest: "{{ idea_build_workspace }}/frontend/"
    mode: preserve
  when: platform_build_frontend

- name: Sync backend source to target build workspace
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../backend/"
    dest: "{{ idea_build_workspace }}/backend/"
    mode: preserve
  when: platform_build_backend

- name: Build platform frontend image from repo source
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - docker
      - build
      - -t
      - "{{ idea_frontend_image }}"
      - "{{ idea_build_workspace }}/frontend"
  environment:
    PATH: "{{ platform_cli_path }}"
    DOCKER_CONFIG: "{{ idea_docker_config_dir }}"
  when: platform_build_frontend

- name: Build platform backend image from repo source
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - docker
      - build
      - -t
      - "{{ idea_backend_image }}"
      - "{{ idea_build_workspace }}/backend"
  environment:
    PATH: "{{ platform_cli_path }}"
    DOCKER_CONFIG: "{{ idea_docker_config_dir }}"
  when: platform_build_backend

- name: Load platform frontend image into kind
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - kind
      - load
      - docker-image
      - "{{ idea_frontend_image }}"
      - --name
      - "{{ kind_cluster_name }}"
  environment:
    PATH: "{{ platform_cli_path }}"
  when: platform_build_frontend

- name: Load platform backend image into kind
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - kind
      - load
      - docker-image
      - "{{ idea_backend_image }}"
      - --name
      - "{{ kind_cluster_name }}"
  environment:
    PATH: "{{ platform_cli_path }}"
  when: platform_build_backend

- name: Render idea platform manifest
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/idea-platform-app.yaml.j2"
    dest: /tmp/idea-platform-app.yaml
    mode: "0644"

- name: Apply idea platform manifest
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - /tmp/idea-platform-app.yaml
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Restart backend deployment to pick up rebuilt image
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - rollout
      - restart
      - "deployment/{{ idea_backend_name }}"
      - -n
      - "{{ idea_namespace }}"
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"
  when: platform_build_backend

- name: Restart frontend deployment to pick up rebuilt image
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - rollout
      - restart
      - "deployment/{{ idea_frontend_name }}"
      - -n
      - "{{ idea_namespace }}"
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"
  when: platform_build_frontend

- name: Wait for frontend rollout
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - rollout
      - status
      - "deployment/{{ idea_frontend_name }}"
      - -n
      - "{{ idea_namespace }}"
      - --timeout=300s
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Wait for backend rollout
  become: "{{ not platform_is_darwin }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - rollout
      - status
      - "deployment/{{ idea_backend_name }}"
      - -n
      - "{{ idea_namespace }}"
      - --timeout=300s
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"
