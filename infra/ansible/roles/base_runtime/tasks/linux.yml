- name: Ensure apt keyring directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install base packages
  become: true
  ansible.builtin.apt:
    name: "{{ platform_prereq_packages }}"
    update_cache: true
    state: present

- name: Determine binary architecture
  ansible.builtin.set_fact:
    binary_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_architecture] | default(ansible_architecture) }}"

- name: Install Docker GPG key
  become: true
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ binary_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    filename: docker
    state: present

- name: Install Docker packages
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present

- name: Enable Docker service
  become: true
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Install kind binary
  become: true
  ansible.builtin.get_url:
    url: "https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-{{ binary_arch }}"
    dest: /usr/local/bin/kind
    mode: "0755"

- name: Install kubectl binary
  become: true
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/{{ binary_arch }}/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"

- name: Download Helm archive
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ helm_version }}-linux-{{ binary_arch }}.tar.gz"
    dest: "/tmp/helm-{{ helm_version }}-linux-{{ binary_arch }}.tar.gz"
    mode: "0644"

- name: Extract Helm archive
  ansible.builtin.unarchive:
    src: "/tmp/helm-{{ helm_version }}-linux-{{ binary_arch }}.tar.gz"
    dest: /tmp
    remote_src: true

- name: Install Helm binary
  become: true
  ansible.builtin.copy:
    src: "/tmp/linux-{{ binary_arch }}/helm"
    dest: /usr/local/bin/helm
    mode: "0755"
    remote_src: true

- name: Validate Docker daemon on Linux
  become: true
  ansible.builtin.command:
    argv:
      - docker
      - info
  changed_when: false

