- name: Ensure kubeconfig directory exists
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.file:
    path: "{{ platform_kubeconfig_path | dirname }}"
    state: directory
    mode: "0755"

- name: Render kind cluster config
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/kind-config.yaml.j2"
    dest: /tmp/idea-kind-config.yaml
    mode: "0644"

- name: Check existing kind clusters
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.command:
    argv:
      - kind
      - get
      - clusters
  register: kind_clusters
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Create kind cluster
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.command:
    argv:
      - kind
      - create
      - cluster
      - --name
      - "{{ kind_cluster_name }}"
      - --config
      - /tmp/idea-kind-config.yaml
  when: kind_cluster_name not in kind_clusters.stdout_lines
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"

- name: Wait for cluster nodes to become ready
  become: "{{ ansible_system != 'Darwin' }}"
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --for=condition=Ready
      - nodes
      - --all
      - --timeout=180s
  changed_when: false
  environment:
    PATH: "{{ platform_cli_path }}"
    KUBECONFIG: "{{ platform_kubeconfig_path }}"
