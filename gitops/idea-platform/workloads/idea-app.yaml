apiVersion: apps/v1
kind: Deployment
metadata:
  name: idea-frontend
  namespace: idea-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idea-frontend
  template:
    metadata:
      labels:
        app: idea-frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: idea-frontend
  namespace: idea-system
spec:
  selector:
    app: idea-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idea-backend
  namespace: idea-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idea-backend
  template:
    metadata:
      labels:
        app: idea-backend
    spec:
      containers:
        - name: backend
          image: mendhak/http-https-echo:31
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: HTTP_RESPONSE
              value: '{"status":"ok","service":"idea-backend"}'
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: idea-backend
  namespace: idea-system
spec:
  selector:
    app: idea-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
